<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViaCEP</title>
</head>
<body>

  <div class="form-box">
    <h2>Formulário</h2>

    <form>
      <div class="input-group">
        <label>CEP</label>
        <input type="text" id="cep" placeholder="Digite seu CEP">
      </div>

      <div class="input-group">
        <label>Cidade</label>
        <input type="text" id="cidade" placeholder="Digite sua Cidade">
      </div>

      <div class="input-group">
        <label>Bairro</label>
        <input type="text" id="bairro" placeholder="Digite seu Bairro">
      </div>

      <div class="input-group">
        <label>Estado</label>
        <input type="text" id="estado" placeholder="Digite seu Estado">
      </div>
    </form>

    <button id="enviar">Enviar</button>
  </div>

  <script src="assets/script/cep.js"></script>
</body>
</html>
